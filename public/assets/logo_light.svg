<svg width="180" height="48" viewBox="0 0 180 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Horizontal layout: leaf icon on left, text on right — light variant for dark backgrounds -->

  <!-- Leaf icon (scaled down, centered vertically) -->
  <g transform="translate(6, 2)">
    <path d="M18,2 C18,2 8,12 8,24 C8,35 13,42 18,43 C23,42 28,35 28,24 C28,12 18,2 18,2 Z" fill="#8A9A5B"/>
    <line x1="18" y1="43" x2="18" y2="46" stroke="#8A9A5B" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Gold centre vein -->
    <path d="M18,8 C18,20 18,35 18,43" fill="none" stroke="#c9a84c" stroke-width="0.7" stroke-linecap="round" opacity="0.8"/>
    <!-- Left vein -->
    <path d="M18,22 C14,27 11,30 9,34" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Right vein -->
    <path d="M18,22 C22,27 25,30 27,34" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- SAGE text — white for dark backgrounds -->
  <text x="48" y="27" style="font-family: Georgia, 'Times New Roman', serif; font-size: 24px; font-weight: 400; fill: rgba(255,255,255,0.95); letter-spacing: 3px;">SAGE</text>

  <!-- ADVISORY text — white/dimmed for dark backgrounds -->
  <text x="48" y="40" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 8.5px; font-weight: 400; fill: rgba(255,255,255,0.6); letter-spacing: 4px;">ADVISORY</text>
</svg>
